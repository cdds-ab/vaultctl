# Pre-commit hooks configuration
# Install: uv run pre-commit install
# Run manually: uv run pre-commit run --all-files
#
# IMPORTANT: Keep versions in sync with pyproject.toml [dependency-groups] dev.
# CI runs these hooks via pre-commit/action@v3.0.1 — single source of truth.

repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # MyPy - Static type checker (local hook to use project dependencies)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy --strict src/
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false

  # Bandit - Security vulnerability scanner
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # Commitizen - Enforce conventional commits
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Radon - Code complexity analysis
  # Shows C grade and worse. Blocks on D grade (CC > 20).
  - repo: local
    hooks:
      - id: radon-cc
        name: radon cyclomatic complexity
        entry: bash -c 'output=$(uv run radon cc src/vaultctl -n C --no-assert --total-average); echo "$output"; if echo "$output" | grep -qE " - [D-F]$"; then echo ""; echo "ERROR: Functions with CC grade D or worse found. Refactor to reduce complexity."; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

  # Local hooks
  - repo: local
    hooks:
      - id: pytest-cov
        name: pytest with coverage
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
        args:
          - --cov=vaultctl
          - --cov-fail-under=70
          - --cov-report=term-missing:skip-covered
          - -q

      - id: check-documentation-updates
        name: documentation update reminders
        entry: python scripts/check_documentation_updates.py
        language: system
        pass_filenames: false
        always_run: true

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
      - id: detect-private-key
        exclude: ^tests/
